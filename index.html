<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kim Hai Gateway | Chọn ngôn ngữ</title>
  <meta name="description" content="Kim Hai Gateway - Cửa ngõ B2B toàn diện giữa Hàn Quốc và Việt Nam." />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="lang-landing-page">
  <main class="lang-landing-wrap">
    <section class="lang-landing-hero">
      <div class="lang-copy-panel">
        <div class="lang-brand-head">
          <img src="/assets/logo-khg.png" alt="Logo Kim Hai Gateway" class="lang-logo-img">
          <div class="lang-brand-text">
            <h1>Kim Hai Gateway</h1>
            <p class="lang-brand-vi">Cửa ngõ B2B toàn diện giữa Hàn Quốc và Việt Nam</p>
            <p class="lang-brand-ko">한국과 베트남을 잇는 종합 B2B 게이트웨이</p>
          </div>
        </div>
        <p class="lang-eyebrow">CHỌN NGÔN NGỮ / 언어 선택</p>
        <h2>Chọn ngôn ngữ</h2>
        <p class="lang-subtitle">
          Vui lòng chọn ngôn ngữ phù hợp để tiếp tục website Kim Hai Gateway.
        </p>
        <p class="lang-subtitle-ko">
          김하이 게이트웨이 웹사이트에 접속할 언어를 선택해 주세요.
        </p>

        <div class="lang-actions">
          <a class="btn btn-primary" href="/vi/index.html">Tiếng Việt</a>
          <a class="btn btn-secondary" href="/ko/index.html">한국어</a>
        </div>
        <div class="lang-note">
          <span>Vietnam–Korea B2B Gateway</span>
          <span>한–베 비즈니스 게이트웨이</span>
        </div>
      </div>
      <div class="lang-visual-panel">
        <figure class="lang-visual-main">
          <img src="/assets/uniform-board.png" alt="Hình ảnh đồng phục thương hiệu Kim Hai Gateway">
          <figcaption>Nhận diện đồng phục thương hiệu / 브랜드 유니폼 시스템</figcaption>
        </figure>

        <div class="lang-visual-grid">
          <figure class="lang-visual-card">
            <img src="/assets/uniform-gallery.png" alt="Hình ảnh đồng phục Kim Hai Gateway">
            <figcaption>Hình ảnh thương hiệu / 브랜드 적용 이미지</figcaption>
          </figure>
          <figure class="lang-visual-card logo-card">
            <img src="/assets/logo-khg.png" alt="Logo Kim Hai Gateway">
            <figcaption>Nhận diện thương hiệu / 브랜드 아이덴티티</figcaption>
          </figure>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
